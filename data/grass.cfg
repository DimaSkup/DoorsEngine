;==========================================================
; configure grass here:
; 1. setup its common params (for all grass)
; 2. register "grass fields"
;==========================================================

common_params {
	grass_dist_full_size       0
	grass_dist_visible         40
}

grass_field "grass_0" {
	channel_0_model            grass_0
	channel_1_model            grass_0
	channel_2_model            grass_0
	channel_3_model            grass_0
	material                   grass_0
	grass_field_center_x       256
	grass_field_center_z       256
	grass_field_size_x         512
	grass_field_size_z         512
	cells_by_x                 16
	cells_by_z                 16
	texture_slots              4
	texture_rows               4
	grass_count                100000
	density_mask               data/textures/plants/grass_density_map.bmp
	grass_min_height           0.5
	grass_max_height           1.0
}

grass_field "grass_1" {
	channel_0_model            grass_0
	channel_1_model            grass_0
	channel_2_model            grass_0
	channel_3_model            grass_0
	material                   grass_0
	grass_field_center_x       256
	grass_field_center_z       256
	grass_field_size_x         512
	grass_field_size_z         512
	cells_by_x                 16
	cells_by_z                 16
	texture_slots              4
	texture_rows               4
	grass_count                100000
	density_mask               grass_density_map.bmp
	grass_min_height           0.5
	grass_max_height           1.0
}