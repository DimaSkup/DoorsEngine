;==========================================================
; configure grass here:
; 1. setup its common params (for all grass)
; 2. register "grass fields"
;==========================================================

common_params {
	grass_dist_full_size       0
	grass_dist_visible         50
}

grass_field "grass_0" {
	channel_0_model                generated
	channel_1_model                generated
	channel_2_model                generated
	channel_3_model                generated
	channel_0_probability          0.3
	channel_1_probability          1.0
	channel_2_probability          0.005
	channel_3_probability          0.3
	channel_0_grass_scale_range    0.05 0.3
	channel_1_grass_scale_range    0.05 0.3
	channel_2_grass_scale_range    0.4 1.0
	channel_3_grass_scale_range    0.05 0.3
	material                       grass_0
	grass_field_center_x           256
	grass_field_center_z           256
	grass_field_size_x             512
	grass_field_size_z             512
	cells_by_x                     64
	cells_by_z                     64
	texture_slots                  4
	texture_rows                   4
	grass_count                    3330000
	density_mask_rgb               data/textures/plants/grass_density_map_rgb.bmp
	density_mask_alpha             data/textures/plants/grass_density_map_alpha.bmp
}

