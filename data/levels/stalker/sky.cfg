;==========================================================
; configure sky related stuff here:
;==========================================================

skybox {
	load_cubemap_texture  0
	material              sky_mat_01
	cubemap_texture       sky/cubemap0
	cubemap_dir           data/textures/sky/cubemaps/cubemap0/
	sky_pos_x             sky_px.png
	sky_neg_x             sky_nx.png
	sky_pos_y             sky_py.png
	sky_neg_y             sky_ny.png
	sky_pos_z             sky_pz.png
	sky_neg_z             sky_nz.png
	sky_box_size          1000.0
	sky_box_offset_y      490
}

skyplane {
	sky_pl_resolution     10
	sky_pl_length         10.0
	sky_pl_top            1.5
	sky_pl_bottom         0.0
	tex_repeat            4
	brightness            0.3
	tex0_speed_x          -0.03
	tex0_speed_z          0.0
	tex1_speed_x          -0.015
	tex1_speed_z          0.0
	material              sky_plane_clouds
}

skydome {
	color_center          0.50 0.50 0.50
	color_apex            0.38 0.45 0.51
	num_slices            20
	num_stacks            20
}