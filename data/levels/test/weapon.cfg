;====================================================================
; register player's weapons:
; its entity, skeleton for animation, sounds, animation types, etc.
;====================================================================
wpn "pm_hud" {
	type             pistol
	entity           wpn_pm_hud
	skeleton         wpn_pm_hud
	sound_draw       wpn_pm_draw
	sound_reload     wpn_pm_reload
	sound_shoot      wpn_pm_shoot
	anim_draw        wpn_pm_hud_ogf_draw
	anim_reload      wpn_pm_hud_ogf_reload
	anim_shoot       wpn_pm_hud_ogf_shoot1
	anim_run         wpn_pm_hud_ogf_idle
	anim_idle        wpn_pm_hud_ogf_idle
}